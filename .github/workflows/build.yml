name: Build

on:
  push:
    branches: [master]
    tags:     ["v*"]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            libgl1 libglib2.0-0 libdbus-1-3 \
            libxcb1 libxcb-cursor0 libxcb-icccm4 libxcb-image0 \
            libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 \
            libxcb-shape0 libxcb-xinerama0 libxcb-xkb1 \
            libxkbcommon-x11-0 libfontconfig1 \
            imagemagick libfuse2

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Generate Qt UI Python files
        run: |
          for ui_file in src/gui/ui/*.ui; do
            base=$(basename "$ui_file" .ui)
            pyside6-uic "$ui_file" -o "src/gui/ui_${base}.py"
          done

      - name: Inject version into src/_version.py
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            VERSION="nightly"
          fi
          REPO="${GITHUB_REPOSITORY}"
          BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          printf '__version__ = "%s"\nGITHUB_REPO = "%s"\n__build_time__ = "%s"\n__commit__ = "%s"\n' \
            "$VERSION" "$REPO" "$BUILD_TIME" "${GITHUB_SHA}" > src/_version.py

      # ----------------------------------------------------------------
      # Firmware — built ONCE here (Linux) and reused by the Windows job
      # (ESP .bin files are identical regardless of the host OS, and the
      # ESP-IDF gateway build does not work on Windows runners). Cached by a
      # hash of the firmware sources, so an unchanged firmware tree is not
      # recompiled.
      # ----------------------------------------------------------------

      - name: Cache built firmware binaries
        id: fwcache
        uses: actions/cache@v4
        with:
          path: |
            firmware/gateway/firmware.bin
            firmware/gateway/firmware-esp32.bin
            firmware/node_actuator/firmware-direct-release.bin
            firmware/node_actuator/firmware-direct-debug.bin
            firmware/node_actuator/firmware-multiplexed-release.bin
            firmware/node_actuator/firmware-multiplexed-debug.bin
            firmware/node_magnet_sensor/firmware-release.bin
          key: fwbins-${{ hashFiles('firmware/common/**', 'firmware/gateway/src/**', 'firmware/gateway/platformio.ini', 'firmware/gateway/CMakeLists.txt', 'firmware/gateway/sdkconfig.defaults', 'firmware/node_actuator/src/**', 'firmware/node_actuator/platformio.ini', 'firmware/node_magnet_sensor/src/**', 'firmware/node_magnet_sensor/platformio.ini') }}

      - name: Install PlatformIO
        if: steps.fwcache.outputs.cache-hit != 'true'
        run: pip install platformio esptool

      - name: Cache PlatformIO toolchain
        if: steps.fwcache.outputs.cache-hit != 'true'
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-pio-${{ hashFiles('firmware/**/platformio.ini') }}
          restore-keys: ${{ runner.os }}-pio-

      # Gateway — two board variants (see firmware/gateway/README.md):
      #   firmware.bin       -> Seeed XIAO ESP32-C6 (ESP-IDF, bootloader @ 0x0)
      #   firmware-esp32.bin -> classic ESP32-WROOM  (Arduino, bootloader @ 0x1000)
      - name: Build gateway firmware (XIAO ESP32-C6 + ESP32-WROOM)
        if: steps.fwcache.outputs.cache-hit != 'true'
        run: |
          cd firmware/gateway
          python -m platformio run -e seeed_xiao_esp32c6
          python -m esptool --chip esp32c6 merge_bin \
            --flash_mode dio --flash_freq 80m --flash_size 4MB \
            -o firmware.bin \
            0x0 .pio/build/seeed_xiao_esp32c6/bootloader.bin \
            0x8000 .pio/build/seeed_xiao_esp32c6/partitions.bin \
            0x10000 .pio/build/seeed_xiao_esp32c6/firmware.bin
          python -m platformio run -e esp32dev
          python -m esptool --chip esp32 merge_bin \
            --flash_mode dio --flash_freq 40m --flash_size 4MB \
            -o firmware-esp32.bin \
            0x1000 .pio/build/esp32dev/bootloader.bin \
            0x8000 .pio/build/esp32dev/partitions.bin \
            0x10000 .pio/build/esp32dev/firmware.bin

      # Nodes: actuator (direct + multiplexed x release/debug) + sensor.
      # Bins land in per-node-type dirs so the .spec/wizard layout stays
      # keyed by node type.
      - name: Build node firmware (actuator + sensor)
        if: steps.fwcache.outputs.cache-hit != 'true'
        run: |
          cd firmware/node_actuator
          mergebin() {  # $1 = pio env, $2 = output path (relative to firmware/)
            python -m platformio run -e "$1"
            mkdir -p "$(dirname "../$2")"
            python -m esptool --chip esp32 merge_bin \
              --flash_mode dio --flash_freq 40m --flash_size 4MB \
              -o "../$2" \
              0x1000 ".pio/build/$1/bootloader.bin" \
              0x8000 ".pio/build/$1/partitions.bin" \
              0x10000 ".pio/build/$1/firmware.bin"
          }
          mergebin direct            node_actuator/firmware-direct-release.bin
          mergebin direct_debug      node_actuator/firmware-direct-debug.bin
          mergebin multiplexed       node_actuator/firmware-multiplexed-release.bin
          mergebin multiplexed_debug node_actuator/firmware-multiplexed-debug.bin
          cd ../node_magnet_sensor
          python -m platformio run -e esp32dev
          python -m esptool --chip esp32 merge_bin \
            --flash_mode dio --flash_freq 40m --flash_size 4MB \
            -o firmware-release.bin \
            0x1000 .pio/build/esp32dev/bootloader.bin \
            0x8000 .pio/build/esp32dev/partitions.bin \
            0x10000 .pio/build/esp32dev/firmware.bin

      # ----------------------------------------------------------------
      # Collect all firmware binaries (flat names, for the release zip)
      # ----------------------------------------------------------------

      - name: Collect firmware binaries
        run: |
          mkdir -p firmware-binaries
          cp firmware/gateway/firmware.bin                       firmware-binaries/gateway-c6.bin
          cp firmware/gateway/firmware-esp32.bin                 firmware-binaries/gateway-esp32.bin
          cp firmware/node_actuator/firmware-direct-release.bin       firmware-binaries/node_direct-release.bin
          cp firmware/node_actuator/firmware-direct-debug.bin         firmware-binaries/node_direct-debug.bin
          cp firmware/node_actuator/firmware-multiplexed-release.bin  firmware-binaries/node_multiplexed-release.bin
          cp firmware/node_actuator/firmware-multiplexed-debug.bin    firmware-binaries/node_multiplexed-debug.bin
          cp firmware/node_magnet_sensor/firmware-release.bin           firmware-binaries/node_magnet_sensor.bin

      - name: Upload firmware artifact (flat, for releases)
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: firmware-binaries/
          retention-days: 30

      # Tree-layout copy the Windows job drops straight into the workspace so
      # PyInstaller bundles them without rebuilding any firmware.
      - name: Upload firmware binaries (tree layout, for the app bundle)
        uses: actions/upload-artifact@v4
        with:
          name: firmware-tree
          path: |
            firmware/gateway/firmware.bin
            firmware/gateway/firmware-esp32.bin
            firmware/node_actuator/firmware-direct-release.bin
            firmware/node_actuator/firmware-direct-debug.bin
            firmware/node_actuator/firmware-multiplexed-release.bin
            firmware/node_actuator/firmware-multiplexed-debug.bin
            firmware/node_magnet_sensor/firmware-release.bin
          retention-days: 30

      # ----------------------------------------------------------------
      # Python desktop application
      # ----------------------------------------------------------------

      - name: Build with PyInstaller
        run: pyinstaller softedibo.spec

      # ----------------------------------------------------------------
      # AppImage — single file, double-click to open
      # ----------------------------------------------------------------

      - name: Download appimagetool
        run: |
          wget -q https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage
          ./appimagetool-x86_64.AppImage --appimage-extract
          mv squashfs-root appimagetool-bin

      - name: Generate app icon
        run: |
          convert -size 256x256 gradient:'#1a5276-#2980b9' \
            -font DejaVu-Sans-Bold -pointsize 32 -fill white \
            -gravity Center -annotate 0 "SoftEdIBO" softedibo.png

      - name: Create AppDir
        run: |
          mkdir -p SoftEdIBO.AppDir
          cp -r dist/SoftEdIBO/. SoftEdIBO.AppDir/

          # Empty gio-modules dir prevents loading incompatible system GIO modules
          mkdir -p SoftEdIBO.AppDir/gio-modules

          cat > SoftEdIBO.AppDir/AppRun << 'APPRUN'
          #!/bin/bash
          # Prevent loading incompatible system GIO/GVfs modules
          export GIO_MODULE_DIR="$APPDIR/gio-modules"
          # Suppress atk-bridge / AT-SPI accessibility warnings
          export NO_AT_BRIDGE=1
          exec "$APPDIR/SoftEdIBO" "$@"
          APPRUN
          chmod +x SoftEdIBO.AppDir/AppRun

          cat > SoftEdIBO.AppDir/softedibo.desktop << 'DESKTOP'
          [Desktop Entry]
          Name=SoftEdIBO
          Comment=Soft-based robot for inclusive education
          Exec=SoftEdIBO
          Icon=softedibo
          Terminal=false
          Type=Application
          Categories=Education;
          DESKTOP

          cp softedibo.png SoftEdIBO.AppDir/softedibo.png
          cp softedibo.png SoftEdIBO.AppDir/.DirIcon

      - name: Build AppImage
        run: |
          ARCH=x86_64 ./appimagetool-bin/AppRun \
            SoftEdIBO.AppDir SoftEdIBO-x86_64.AppImage

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: SoftEdIBO-linux-x86_64
          path: SoftEdIBO-x86_64.AppImage
          retention-days: 30

  # -----------------------------------------------------------------------
  # Windows build — produces a portable zip
  # -----------------------------------------------------------------------
  build-windows:
    needs: build          # reuse the firmware built on Linux; never rebuild it here
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Generate Qt UI Python files
        shell: bash
        run: |
          for ui_file in src/gui/ui/*.ui; do
            base=$(basename "$ui_file" .ui)
            pyside6-uic "$ui_file" -o "src/gui/ui_${base}.py"
          done

      - name: Inject version into src/_version.py
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            VERSION="nightly"
          fi
          REPO="${GITHUB_REPOSITORY}"
          BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          printf '__version__ = "%s"\nGITHUB_REPO = "%s"\n__build_time__ = "%s"\n__commit__ = "%s"\n' \
            "$VERSION" "$REPO" "$BUILD_TIME" "${GITHUB_SHA}" > src/_version.py

      # Firmware is built once on Linux (the ESP-IDF gateway build does not work
      # on Windows runners, and ESP .bin files are host-OS-independent). Drop the
      # tree-layout bins into the workspace so PyInstaller bundles them.
      - name: Download firmware binaries (built on Linux)
        uses: actions/download-artifact@v4
        with:
          name: firmware-tree
          path: firmware

      - name: Build with PyInstaller
        run: pyinstaller softedibo.spec

      - name: Create zip archive
        shell: pwsh
        run: Compress-Archive -Path dist/SoftEdIBO/* -DestinationPath SoftEdIBO-windows-x64.zip

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: SoftEdIBO-windows-x64
          path: SoftEdIBO-windows-x64.zip
          retention-days: 30

  # -----------------------------------------------------------------------
  # Every push to master: creates/updates a rolling "nightly" pre-release.
  # Not triggered on tag pushes (release job handles those).
  # -----------------------------------------------------------------------
  nightly:
    needs: [build, build-windows]
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: SoftEdIBO-linux-x86_64

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: SoftEdIBO-windows-x64

      - name: Download firmware artifact
        uses: actions/download-artifact@v4
        with:
          name: firmware
          path: firmware-binaries/

      - name: Zip firmware binaries
        run: zip -j firmware.zip firmware-binaries/*.bin

      - name: Create/update nightly pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: "Nightly"
          prerelease: true
          files: |
            SoftEdIBO-x86_64.AppImage
            SoftEdIBO-windows-x64.zip
            firmware.zip
          body: |
            <!-- commit: ${{ github.sha }} -->
            Automatic build from the latest commit on `master`. Not a stable release.

            **Linux:** `chmod +x SoftEdIBO-x86_64.AppImage && ./SoftEdIBO-x86_64.AppImage`
            **Windows:** extract `SoftEdIBO-windows-x64.zip` and run `SoftEdIBO.exe`

            **Firmware** (`firmware.zip`): two gateway variants (C6 + WROOM), release/debug for both actuator node types, and the sensor node.
            Flash with `esptool.py --chip esp32 write_flash 0x0 <bin>`.

  # -----------------------------------------------------------------------
  # Tags v*: creates a stable GitHub release (available via OTA).
  # -----------------------------------------------------------------------
  release:
    needs: [build, build-windows]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: SoftEdIBO-linux-x86_64

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: SoftEdIBO-windows-x64

      - name: Download firmware artifact
        uses: actions/download-artifact@v4
        with:
          name: firmware
          path: firmware-binaries/

      - name: Zip firmware binaries
        run: zip -j firmware.zip firmware-binaries/*.bin

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            SoftEdIBO-x86_64.AppImage
            SoftEdIBO-windows-x64.zip
            firmware.zip
          generate_release_notes: true
          body: |
            ## Linux (x86-64)

            1. Download **`SoftEdIBO-x86_64.AppImage`**
            2. Make it executable (once):
               ```bash
               chmod +x SoftEdIBO-x86_64.AppImage
               ```
            3. **Double-click** — the setup wizard opens automatically.

            > **Serial port (USB):** if this is your first time, run:
            > `sudo usermod -aG dialout $USER`  and log out/in.

            Application data is stored in `~/.local/share/SoftEdIBO/`.

            ## Windows (x64)

            1. Download and extract **`SoftEdIBO-windows-x64.zip`**
            2. Run **`SoftEdIBO.exe`** — the setup wizard opens automatically.

            > **Serial port (USB):** install the CH340 or CP210x driver if your device isn't detected.

            Application data is stored in `%APPDATA%\SoftEdIBO\`.

            ## Firmware (`firmware.zip`)

            The desktop app already includes these binaries — use `Tools => Flash Firmware…`
            to flash. Manual flashing is also possible:
            ```bash
            esptool.py --chip esp32 write_flash 0x0 <bin>
            ```

            | File | Node type | Description |
            |------|-----------|-------------|
            | `gateway-c6.bin` | Gateway | USB–ESP-NOW bridge, **Seeed XIAO ESP32-C6** (ESP-IDF) |
            | `gateway-esp32.bin` | Gateway | USB–ESP-NOW bridge, **classic ESP32-WROOM** (Arduino) |
            | `node_direct-release.bin` | `node_direct` | 3 chambers, direct sensors/valves, onboard pumps |
            | `node_direct-debug.bin` | `node_direct` | Same as above with Serial logs (`DEBUG_BUILD`) |
            | `node_multiplexed-release.bin` | `node_multiplexed` | Up to 12 chambers, multiplexed valves/sensors, optional shared pressure/vacuum tanks, runtime-sized |
            | `node_multiplexed-debug.bin` | `node_multiplexed` | Same as above with Serial logs (`DEBUG_BUILD`) |
            | `node_magnet_sensor.bin` | `node_magnet_sensor` | 4× MLX90393 magnetic touch board (node_magnet_sensor protocol) |

            > **Note:** pick the gateway bin for your board. The C6 flashes at
            > `0x0` (`esptool.py --chip esp32c6 write_flash 0x0 gateway-c6.bin`);
            > the WROOM and all node bins flash with `--chip esp32` at `0x0`.
