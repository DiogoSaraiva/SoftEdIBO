; SoftEdIBO ESP-NOW gateway — ESP-IDF firmware for the Seeed XIAO ESP32-C6.
;
; The C6 (RISC-V) needs ESP-IDF 5.x. The official PlatformIO `espressif32`
; platform (6.x) ships Arduino core 2.x and does NOT support the C6 with the
; espidf framework, so we pin the pioarduino fork (verified: IDF 5.5.4, builds
; clean for esp32c6). The `stable` tag tracks the latest pioarduino release;
; pin a specific tag (e.g. .../download/55.03.38/...) for full reproducibility.
;
; Alternatively build with native ESP-IDF — the CMakeLists.txt are shared:
;     cd firmware/gateway && idf.py set-target esp32c6 && idf.py build
[env:seeed_xiao_esp32c6]
platform      = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board         = seeed_xiao_esp32c6
framework     = espidf

monitor_speed = 115200
