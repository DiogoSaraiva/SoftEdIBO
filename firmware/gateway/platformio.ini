; SoftEdIBO ESP-NOW gateway — bridges PC (USB serial) <-> ESP-NOW (nodes).
;
; TWO board variants are supported (same serial protocol, shared se_espnow.h):
;   seeed_xiao_esp32c6 -> src/main.cpp         (ESP-IDF, Seeed XIAO ESP32-C6)
;   esp32dev           -> src/main_arduino.cpp (Arduino, classic ESP32-WROOM-32)
;
; Each env compiles only its own entry point:
;   - the espidf env builds main.cpp via src/CMakeLists.txt (main_arduino.cpp
;     is not in its SRCS, so it is ignored);
;   - the arduino env excludes main.cpp via build_src_filter.

[env]
monitor_speed = 115200

; --- New: Seeed XIAO ESP32-C6 (ESP-IDF) ---
;
; The C6 (RISC-V) needs ESP-IDF 5.x. The official PlatformIO `espressif32`
; platform (6.x) ships Arduino core 2.x and does NOT support the C6 with the
; espidf framework, so we pin the pioarduino fork (verified: IDF 5.5.4). The
; `stable` tag tracks the latest release; pin a tag (e.g. .../download/55.03.38/)
; for full reproducibility. Native ESP-IDF also works (shared CMakeLists.txt):
;     cd firmware/gateway && idf.py set-target esp32c6 && idf.py build
[env:seeed_xiao_esp32c6]
platform  = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board     = seeed_xiao_esp32c6
framework = espidf

; --- Old: ESP32-WROOM-32 DevKit (Arduino), USB-UART bridge ---
[env:esp32dev]
platform         = espressif32 @ ^6.0.0
board            = esp32dev
framework        = arduino
upload_speed     = 921600
build_src_filter = +<*> -<main.cpp>
build_unflags    = -std=gnu++11
build_flags =
    -std=gnu++17
    -I${PROJECT_DIR}/../common
lib_deps =
    bblanchon/ArduinoJson @ ^7.0.0
    ; se_espnow.h pulls WiFi in from the common dir (outside src/) — declare it.
    WiFi
