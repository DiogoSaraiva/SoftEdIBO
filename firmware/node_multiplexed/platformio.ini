[env]
platform  = espressif32 @ ^6.0.0
board     = esp32dev
framework = arduino

monitor_speed = 115200
upload_speed  = 921600

build_unflags = -std=gnu++11
build_flags   = -std=gnu++17

lib_deps =
    bblanchon/ArduinoJson @ ^7.0.0
    adafruit/Adafruit PWM Servo Driver Library @ ^3.0.0

; Sizing (chamber count, pump→tank mapping, sensor channel mapping) is
; determined at runtime via I2C scan + pulse-detect, not at compile time.

[env:release]
build_flags = ${env.build_flags} -O2 -DNDEBUG

[env:debug]
build_flags = ${env.build_flags} -O0 -g -DDEBUG_BUILD
