; SoftEdIBO node_actuator — pneumatic actuator boards.
; One project, one env per board variant, selected with build_src_filter:
;   direct       -> src/direct/        (3 chambers, onboard pumps)
;   multiplexed  -> src/multiplexed/   (up to 12 chambers, muxed valves/sensors,
;                                        optional shared reservoir tanks)
; Each variant builds release + a *_debug env (Serial logs + "debug" command).
; Shared code (se_espnow.h, units.h, pressure.h, dbg.h, cmd_queue.h) lives in
; firmware/common and is added to the include path here once.
[env]
platform      = espressif32 @ ^6.0.0
board         = esp32dev
framework     = arduino
monitor_speed = 115200
upload_speed  = 921600

; OTA over ESP-NOW (se_ota.h / Update.h) needs a dual-app partition layout
; (app0/app1/otadata). default.csv provides it. A node currently on a non-OTA
; table must be cable-flashed once with this build before OTA works.
board_build.partitions = default.csv

build_unflags = -std=gnu++11
build_flags =
    -std=gnu++17
    -I${PROJECT_DIR}/../common

lib_deps =
    bblanchon/ArduinoJson @ ^7.0.0
    ; se_espnow.h / se_ota.h pull WiFi + Update in from the common dir (outside
    ; src/), so the LDF can't auto-discover them — declare them explicitly.
    WiFi
    Update

[env:direct]
build_src_filter = +<direct/>
build_flags      = ${env.build_flags} -DNODE_DIRECT -O2 -DNDEBUG
lib_deps         = ${env.lib_deps}
                   adafruit/Adafruit NeoPixel

[env:direct_debug]
build_src_filter = +<direct/>
build_flags      = ${env.build_flags} -DNODE_DIRECT -DDEBUG_BUILD -O0 -g
lib_deps         = ${env.lib_deps}
                   adafruit/Adafruit NeoPixel

[env:multiplexed]
build_src_filter = +<multiplexed/>
build_flags      = ${env.build_flags} -DNODE_MULTIPLEXED -O2 -DNDEBUG
lib_deps         = ${env.lib_deps}
                   adafruit/Adafruit PWM Servo Driver Library @ ^3.0.0

[env:multiplexed_debug]
build_src_filter = +<multiplexed/>
build_flags      = ${env.build_flags} -DNODE_MULTIPLEXED -DDEBUG_BUILD -O0 -g
lib_deps         = ${env.lib_deps}
                   adafruit/Adafruit PWM Servo Driver Library @ ^3.0.0
