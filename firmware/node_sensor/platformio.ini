; SoftEdIBO node_sensor — 4x (+1 optional) MLX90393 touch board.
; Kept as its own project (separate ESP) for now; streams the node_imu protocol
; over ESP-NOW using the shared firmware/common/se_espnow.h.
[env:esp32dev]
platform     = espressif32 @ ^6.0.0
board        = esp32dev
framework    = arduino

monitor_speed = 115200
upload_speed  = 921600

build_unflags = -std=gnu++11
build_flags =
    -std=gnu++17
    -I${PROJECT_DIR}/../common

lib_deps =
    adafruit/Adafruit MLX90393
    bblanchon/ArduinoJson @ ^7.0.0
    ; se_espnow.h pulls in WiFi from the shared common dir (outside the src
    ; tree), so the LDF can't auto-discover it — declare it explicitly.
    WiFi
